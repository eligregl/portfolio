<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post - Eligreg López</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">inicio</a></li>
        <li><a href="sobre-mi.html">sobre mí</a></li>
        <li><a href="trabajo.html">trabajo</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div id="post-container">
      <!-- Post will be loaded dynamically -->
    </div>
  </main>

  <footer>
    <h3>Conéctate</h3>
    <div class="social-links">
      <a href="https://www.linkedin.com/in/eligreglopez/" target="_blank" rel="noopener">
        <span>→</span> LinkedIn
      </a>
      <a href="https://github.com/eligregl" target="_blank" rel="noopener">
        <span>→</span> GitHub
      </a>
      <a href="https://twitter.com/Eligregl" target="_blank" rel="noopener">
        <span>→</span> Twitter
      </a>
    </div>
  </footer>

  <script src="js/blog.js"></script>
  <script>
    // Get slug from URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    const slug = urlParams.get('slug');

    document.addEventListener('DOMContentLoaded', async () => {
      if (!slug) {
        document.getElementById('post-container').innerHTML = `
          <div class="narrow-container" style="margin: 4rem auto; text-align: center;">
            <p>No se especificó ningún post.</p>
            <a href="blog.html" class="read-more">← Volver al blog</a>
          </div>
        `;
        return;
      }

      await window.BlogSystem.loadPostsIndex();
      await window.BlogSystem.renderSinglePost(slug, 'post-container');
    });
  </script>
</body>
</html>
